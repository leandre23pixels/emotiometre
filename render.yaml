databases:
  - name: emotiometre-db
    plan: free
    region: frankfurt
    databaseName: emotiometre

services:
  - type: web
    name: emotiometre
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_CODE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: emotiometre-db
          property: connectionString
